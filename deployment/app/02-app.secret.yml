apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: default
  labels:
    app: docai
type: Opaque
stringData:
  JWT_SECRET_KEY: "your-jwt-secret-key-here"
  AI_GATEWAY_KEY: "your-ai-gateway-key-here"

