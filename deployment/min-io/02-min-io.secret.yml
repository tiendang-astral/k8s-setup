apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: default
  labels:
    app: minio
type: Opaque
stringData:
  # Thay bằng giá trị thực trước khi apply
  # Hoặc dùng Sealed Secrets / External Secrets Operator cho production
  MINIO_ROOT_USER: "your-access-key-here"
  MINIO_ROOT_PASSWORD: "your-secret-key-here"

# --- Cách tạo bằng kubectl thay vì hardcode ---
# kubectl create secret generic minio-secret \
#   --from-literal=MINIO_ROOT_USER=<access_key> \
#   --from-literal=MINIO_ROOT_PASSWORD=<secret_key> \
#   --namespace=default
